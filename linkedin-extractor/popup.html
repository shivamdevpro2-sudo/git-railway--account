<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiring Extractor</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      width: 320px;
      padding: 15px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 15px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #0A66C2;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      background: #084f96;
    }

    #status {
      margin-top: 12px;
      font-size: 14px;
      color: green;
      text-align: center;
      word-break: break-word;
    }
  </style>
</head>

<body>

  <h2>Hiring Extractor</h2>

  <button id="extractBtn">
    Extract Content
  </button>

  <div id="status"></div>

  <script src="popup.js"></script>

</body>

</html>
